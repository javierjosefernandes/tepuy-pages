<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tepuy — Hatil&uacute; Studio</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #fbfbfd;
      --fg: #1d1d1f;
      --fg-body: #424245;
      --muted: #86868b;
      --rule: #d2d2d7;
      --card: #f5f5f7;
      --accent: #0071e3;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000;
        --fg: #f5f5f7;
        --fg-body: #c7c7cc;
        --muted: #8e8e93;
        --rule: #38383a;
        --card: #1c1c1e;
        --accent: #0a84ff;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif; color: var(--fg); background: var(--bg); line-height: 1.6; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .container { text-align: center; padding: 24px; }
    h1 { font-size: 2.5rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; }
    p { font-size: 1rem; color: var(--muted); margin-bottom: 24px; }
    .links { display: flex; gap: 24px; justify-content: center; }
    a { color: var(--accent); text-decoration: none; font-size: 1rem; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tepuy</h1>
    <p>by Hatil&uacute; Studio</p>
    <div class="links">
      <a href="privacy/en/">Privacy Policy</a>
      <a href="support/en/">Support</a>
      <a href="roadmap/en/">Roadmap</a>
    </div>
  </div>
</body>
</html>
